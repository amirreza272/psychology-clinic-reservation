<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رزرو نوبت کلینیک مسیر</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>کلینیک مسیر</h1>
            <p>رزرو آنلاین جلسات مشاوره</p>
        </header>
        <section class="card">
            <h2>ثبت نوبت</h2>
            <label>نوع جلسه</label>
            <select>
                <option>حضوری</option>
                <option>آنلاین</option>
            </select>
            <label>تاریخ</label>
            <input type="date">
            <label>ساعت</label>
            <select>
                <option>17:00</option>
                <option>18:00</option>
                <option>19:00</option>
                <option>20:00</option>
                <option>21:00</option>
            </select>
            <label>نام و نام خانوادگی</label>
            <input type="text">
            <label>شماره موبایل</label>
            <input type="tel">
            <label>توضیحات</label>
            <textarea rows="4"></textarea>
            <div class="price">
                940,000 تومان
            </div>
            <button>
                ثبت و پرداخت
            </button>
        </section>
    </div>
</body>
</html>
